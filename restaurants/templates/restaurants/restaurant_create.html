{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>{% if edit_mode %}맛집 수정{% else %}새 맛집 등록{% endif %} - 지우의 맛집기록</title>
    <link rel="icon" type="image/x-icon" href="{% static 'assets/favicon.ico' %}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
    <style>
        /* 지우 님이 작성하신 예쁜 디자인 유지 */
        input, textarea, select {
            display: block;
            width: 100%;
            padding: 0.5rem 0.75rem;
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.5;
            color: #212529;
            background-color: #fff;
            background-clip: padding-box;
            border: 1px solid #ced4da;
            border-radius: 0.375rem;
            margin-bottom: 1.5rem; 
        }
        label {
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: block;
        }
        input[type="file"] {
            padding: 10px;
            background: #f8f9fa;
            border: 2px dashed #dee2e6;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container px-lg-5">
            <a class="navbar-brand" href="{% url 'restaurant_list' %}">지우의 맛집기록</a>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="{% url 'restaurant_list' %}">맛집 탐색</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5" style="margin-top: 50px;">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card p-4 p-lg-5 shadow-sm border-0 bg-light rounded-4">
                    <h2 class="fw-bold mb-5 text-center">
                        {% if edit_mode %}
                            기존 맛집 정보 수정하기 ✏️
                        {% else %}
                            새로운 맛집을 알려주세요! 📍
                        {% endif %}
                    </h2>
                    
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <div class="form-group">
                            {{ form.as_p }}
                        </div>

                        <div class="text-center mt-5">
                            <button type="submit" class="btn btn-primary btn-lg px-5 shadow-sm">
                                {% if edit_mode %}정보 수정 완료{% else %}맛집 등록하기{% endif %}
                            </button>
                            <a href="{% url 'restaurant_list' %}" class="btn btn-outline-secondary btn-lg ms-2">취소</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
