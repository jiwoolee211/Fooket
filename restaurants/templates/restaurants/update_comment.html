{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <h4 class="fw-bold mb-3">댓글 수정하기</h4>
            <p class="text-muted">"{{ restaurant.name }}"에 남긴 댓글을 수정합니다.</p>
            <hr>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <textarea class="form-control" name="comment_text" rows="3">{{ comment.comment }}</textarea>
                </div>
                <div class="text-end">
                    <a href="{% url 'restaurant_detail' restaurant.id %}" class="btn btn-secondary">취소</a>
                    <button type="submit" class="btn btn-warning">수정 완료</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
